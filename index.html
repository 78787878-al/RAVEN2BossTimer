const userPlanGlowLock = {};
const USER_PLAN_ROW_GLOW  = 60 * 1000; 
const USER_PLAN_BODY_GLOW = 60 * 1000;
const UserPlanTimer = (() => {

  const STORAGE_KEY = 'user_plan_timer_v1';
  let plans = {};

  function load() {
    try {
      plans = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch {
      plans = {};
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(plans));
  }

  function isValidTime(text) {
    return /^([01]\d|2[0-3]):([0-5]\d)$/.test(text);
  }

  function getNextTrigger(timeText) {
    const [h, m] = timeText.split(':').map(Number);
    const now = new Date();
    const target = new Date();

    target.setHours(h, m, 0, 0);

    if (target <= now) {
      target.setDate(target.getDate() + 1);
    }
    return target.getTime();
  }

  function setPlan(key, timeText) {
    if (!isValidTime(timeText)) return false;

    plans[key] = {
      timeText,
      nextTrigger: getNextTrigger(timeText),
      firedToday: false
    };
    save();
    return true;
  }

  function removePlan(key) {
    delete plans[key];
    save();
  }

  function getPlan(key) {
    return plans[key] || null;
  }

  function checkAlerts(onFire) {
    const now = Date.now();

    Object.entries(plans).forEach(([key, plan]) => {
      if (now >= plan.nextTrigger && !plan.firedToday) {
        plan.firedToday = true;
        onFire(key, plan);

        const [h, m] = plan.timeText.split(':').map(Number);
        const next = new Date();
        next.setDate(next.getDate() + 1);
        next.setHours(h, m, 0, 0);
        plan.nextTrigger = next.getTime();

        save();
      }
    });
  }

  load();

  return {
    setPlan,
    removePlan,
    getPlan,
    checkAlerts,
    isValidTime
  };
})();
function findRowByPlanKey(key) {
  const m = key.match(/^table(\d+)_(.+)$/);
  if (!m) return null;

  const table = m[1];
  const id = m[2];
  let row = null;

  if (table === "6") {
    row = document.querySelector(`#event-table-6 tr[data-id="${id}"]`);
  }

  if (table === "5") {
    row = document.querySelector(`#deathTimer5 tr[data-id="${id}"]`);
  }

  if (table === "3") {
    row = document.querySelector(`#deathTimer3 tr[data-id="${id}"]`);
  }

  if (table === "2") {
    row = document.querySelector(`#deathTimer tr[data-id="${id}"]`);
  }

  if (!row) return null;
  return { row, table };
}
function flashTableRow(row, tableId) {

  userPlanGlowLock[tableId] = true;

  row.classList.add("user-plan-flash");
  setTimeout(() => {
    row.classList.remove("user-plan-flash");
  }, USER_PLAN_ROW_GLOW);
  const bodyClass = `body-glow-${tableId}`;
  document.body.classList.add(bodyClass);

  setTimeout(() => {
    document.body.classList.remove(bodyClass);
    delete userPlanGlowLock[tableId];
  }, USER_PLAN_BODY_GLOW);
}

function createSavedMarker(data) {
  const ratingLayer = document.getElementById("ratingMarkerLayer");

  const marker = document.createElement("div");
  if (data.type === "blob") {
    marker.className = "rating-blob";
    marker.style.position = "absolute";
    marker.style.width = "120px";
    marker.style.height = "120px";
    marker.style.left = data.x + "%";
    marker.style.top = data.y + "%";
    marker.style.borderRadius = "50%";
    marker.style.background = "rgba(173,216,230,0.3)";
    marker.style.border = "4px solid rgba(173,216,230,0.7)";
    marker.style.display = "flex";
    marker.style.flexDirection = "column";
    marker.style.alignItems = "center";
    marker.style.justifyContent = "center";

    const time = document.createElement("div");
    time.className = "rating-blob-time";
    marker.prepend(time);

    ratingLayer.appendChild(marker);

    startRatingTimerFromExpire(time, marker, data.expire);
    return;
  }


  marker.className = "rating-marker";
  marker.style.left = data.x + "%";
  marker.style.top = data.y + "%";

  const time = document.createElement("div");
  time.className = "rating-marker-time";

  const emoji = document.createElement("div");
  if(data.type === "green") emoji.textContent = "🟢";
  if(data.type === "red") emoji.textContent = "🔴";
  if(data.type === "purple") emoji.textContent = "🟣";

  marker.appendChild(time);
  marker.appendChild(emoji);

  ratingLayer.appendChild(marker);

  startRatingTimerFromExpire(time, marker, data.expire);
}

function startRatingTimerFromExpire(timeElement, marker, expireTime){

  function update() {

    const remaining = Math.floor((expireTime - Date.now())/1000);

    if (remaining <= 0) {
      marker.remove();
      return false;
    }

    const m = Math.floor(remaining/60);
    const s = remaining%60;

    timeElement.textContent =
      m + ":" + (s<10?"0"+s:s);

    return true;
  }

  if (!update()) return;

  const interval = setInterval(()=>{
    if (!update()) {
      clearInterval(interval);
    }
  },1000);
}

function formatRemainingTime(ms) {

  if (ms <= 0) {
    return currentLang === "en" ? "0m" : "0м";
  }

  const totalSeconds = Math.floor(ms / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  const hLabel = currentLang === "en" ? "h" : "ч";
  const mLabel = currentLang === "en" ? "m" : "м";
  const sLabel = currentLang === "en" ? "s" : "с";

  let result = "";

  if (hours > 0) result += `${hours}${hLabel} `;
  if (minutes > 0) result += `${minutes}${mLabel} `;
  result += `${seconds}${sLabel}`;

  return result.trim();
}
function formatSpawnTime(date) {

  let hours = date.getHours();
  const minutes = date.getMinutes();
  const seconds = date.getSeconds();

  if (currentLang === "en") {

    const suffix = hours >= 12 ? " PM" : " AM";
    hours = hours % 12 || 12;

    return (
      String(hours).padStart(2, "0") + ":" +
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0") +
      suffix
    );
  }

 
  return (
    String(hours).padStart(2, "0") + ":" +
    String(minutes).padStart(2, "0") + ":" +
    String(seconds).padStart(2, "0")
  );
}

    if (boss.missedAt && now - boss.missedAt <= 24*60*60*1000) return 1;
    if (diff <= 0) return 2;
    if (diff <= 30*60*1000) return 3;

    return 4;

  }

  const pa = priority(a);
  const pb = priority(b);

  if (pa !== pb) return pa - pb;

  if (!a.nextSpawn && !b.nextSpawn) return 0;
  if (!a.nextSpawn) return 1;
  if (!b.nextSpawn) return -1;

  return a.nextSpawn - b.nextSpawn;

});

  if (currentLang === "en") {

function checkMissed() {

  const now = getServerNow();
  const currentDayIndex = (now.getDay() + 6) % 7;
  document.querySelectorAll("#timer .boss-cell").forEach(cell => {

    if (cell.textContent === "☠") return;

    const row = cell.parentElement;
    const timeCell = row.querySelector(".time");
    if (!timeCell || !timeCell.dataset.baseTime) return;

    const [h, m] = timeCell.dataset.baseTime.split(":").map(Number);

    const colIndex = cell.cellIndex - 1;

    const spawn = new Date(now);

    spawn.setDate(now.getDate() - currentDayIndex + colIndex);

    if (now > spawn) {

    }

  });
}

let currentWeekNumber = getWeekNumber(new Date());

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

  let tableAlert = false;

  table3Data.forEach((e, i) => {

    if (!tr) return;

    const nameCell = tr.children[0];
     if (nameCell) {
       nameCell.textContent = t(e.id);
  }
    const statusCell = tr.children[1];
    const timeCell   = tr.children[2];

    if (e.enabled === false) {
      statusCell.textContent = "⚫";
      timeCell.textContent = t("PAUSE");
      return;
    }

    const CYCLE = 3 * 24 * 60 * 60 * 1000;
    const ACTIVE = 10 * 60 * 1000;

    const baseNext = getNextAbyssTime(getAbyssBaseTime(), now);
    let next = new Date(baseNext.getTime() + e.offset * 60000);

    if (now > next.getTime() + ACTIVE) {
      next = new Date(next.getTime() + CYCLE);
      abyssAlertPlayed = {};
    }

    e.next = next;
    const diff = next - now;

    if (diff <= 0 && diff >= -ACTIVE) {
      statusCell.textContent = "🔴";
      timeCell.textContent = t("NOW");
      tableAlert = true;
    } else {
      statusCell.textContent = "🟢";
      const locale = currentLang === "en" ? "en-US" : "ru-RU";

      timeCell.innerHTML =
  next.toLocaleDateString(locale) + "<br>" +
  next.toLocaleTimeString(locale, {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: currentLang === "en"
  });
    }

    ABYSS_ALERTS.forEach(ms => {
      const key = e.id + "_" + ms;
      if (diff <= ms && diff > ms - 1000 && !abyssAlertPlayed[key]) {
        if (soundEnabled) {
          const s = document.getElementById("sound");
          s.currentTime = 0;
          s.volume = globalVolume;
          s.play().catch(()=>{});
        }
        abyssAlertPlayed[key] = true;
      }
    });

    if (diff > ABYSS_ALERTS[0]) abyssAlertPlayed = {};
  });

  document.body.classList.toggle("abyss-glow", tableAlert);
}

  const wrap = document.createElement("div");

  wrap.style.alignItems = "center";

    wrap.style.borderRadius = "50%";

    wrap.textContent = ""; 
    wrap.prepend(time);   
  } else {
    const emoji = document.createElement("div");
    emoji.textContent = ABYSS_EMOJI[m.color];
    wrap.prepend(time);  
    wrap.appendChild(emoji);
  }

  wrap.style.left = m.x + "px";
  wrap.style.top  = m.y + "px";

  abyssLayer.appendChild(wrap);

  wrap.addEventListener("click", e => e.stopPropagation());

  function update(){
    const left = m.expiresAt - Date.now();

    if(left <= 0){
      playMarkerExpireSound();
      wrap.remove();
      abyssMarkers = abyssMarkers.filter(x => x !== m);
      localStorage.setItem(
        "abyssMapMarkers",
        JSON.stringify(abyssMarkers)
      );
      return false;
    }

    time.textContent = formatTime(left);
    return true;
  }

  if (!update()) return;

  const interval = setInterval(()=>{
    if (!update()) clearInterval(interval);
  }, 1000);
}

  const now = getServerNow();

function updateStatus5(event) {
  const now = getServerNow();
  const eventTime = getNextEventTime5(event);

  const minutes = (eventTime - now) / 60000;

  if (minutes <= 10 && minutes >= -10) {
    if (event.status !== "done") event.status = "active";
  }
  else if (minutes < -10 && event.status !== "done") {
    event.status = "missed";
  }
  else if (event.status !== "done") {
    event.status = "waiting";
  }
}

  });
}

  const days = Math.floor(totalMinutes / 1440);

  const minutes = totalMinutes % 60;
  return `${days}д ${hours}ч ${minutes}м`;

function getNextEvent6(event) {
  const now = getServerNow();

  if (event.type === "weekly") {
    let next = new Date(now);
    next.setHours(event.hour, event.minute, 0, 0);

    const diff = (event.weekday - next.getDay() + 7) % 7;
    next.setDate(next.getDate() + diff);

    if (next <= now) next.setDate(next.getDate() + 7);

    next = new Date(next.getTime() + event.offset);
    return next;
  }

  if (event.type === "biweekly") {
    const base = new Date(event.base);
    let next = new Date(base);

    while (next <= now) {
      next.setDate(next.getDate() + 14);
    }

    next = new Date(next.getTime() + event.offset);
    return next;
  }
}
